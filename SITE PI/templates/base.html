<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema{% endblock %}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <header class="top-barPrincipal">
        <div class="brand">
            <h1 class="Page">Página de Denúncias</h1>
            <p class="dev-name">Desenvolvido por Gabriel Flores - 2026</p>
        </div>
        
        <nav class="nav-links">
            <a href="/" class="redirect">Início</a>
            <a href="/perguntas" class="redirect">Perguntas</a>
            <a href="/ajuda-login" class="redirect">Ajuda</a>
            <a href="/login-escola" class="redirect">Admin</a>
        </nav>
    </header>

    <main class="content-container">
        {% block content %}
        {% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
